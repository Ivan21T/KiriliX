<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>KiriliX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/edit_profile.css">
    <link rel="stylesheet" href="../CSS/notification.css">
</head>
<body>
    <div class="alert-container" id="alert-container"></div>

    <div class="animated-bg">
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
    </div>
    <div class="bulgarian-pattern"></div>

    <nav class="edit-nav">
        <a href="javascript:history.back()" class="back-btn" id="backBtn">
            <i class="fas fa-arrow-left"></i>
            <span>Назад към профила</span>
        </a>
    </nav>

    <main class="edit-container">
        <div class="edit-card">
            <div class="edit-header">
                <h1 class="edit-title">Редактиране на профил</h1>
                <p class="edit-subtitle">Актуализирайте вашата информация</p>
            </div>

            <form class="edit-form" id="editForm">
                
                <input type="hidden" id="userId" name="userId" />

                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>
                        Потребителско име
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Въведете потребителско име" value="kiril_ivanov">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i>
                        Имейл адрес
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="Въведете имейл" value="kiril@example.com">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        Нова парола (оставете празно за да запазите старата)
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" placeholder="Въведете нова парола">
                        <i class="fas fa-eye input-icon" id="togglePassword"></i>
                    </div>
                    
                    <div class="password-strength" id="passwordStrength" style="display: none;">
                        <div class="strength-bar">
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                        </div>
                        <div class="strength-text">
                            <i class="fas fa-shield-alt"></i>
                            <span id="strengthMessage">Слаба парола</span>
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="cancelBtn">
                        <i class="fas fa-times"></i>
                        Отказ
                    </button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">
                        <span id="saveBtnText">Запази промените</span>
                        <span class="loader" id="saveLoader" style="display: none;"></span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="../JS/config.js"></script>
    <script src="../JS/notification_system.js"></script>
    <script src="../JS/edit_profile.js"></script>

    </body>
</html>
