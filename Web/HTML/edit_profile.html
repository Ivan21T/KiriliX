<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Редактиране на профил | KiriliX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --white: #ffffff;
            --neon-green: #00ff9d;
            --neon-red: #ff003c;
            --green: #00cc7a;
            --red: #e60033;
            --dark: #0a0a14;
            --dark-secondary: #151522;
            --purple: #8a2be2;
            --cyan: #00f3ff;
            --shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            --glass-bg: rgba(21, 21, 34, 0.7);
            --glass-border: rgba(0, 255, 157, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 157, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(138, 43, 226, 0.03) 0%, transparent 50%),
                linear-gradient(45deg, var(--dark) 0%, #0d0f1a 100%);
        }

        .bg-element {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 15s infinite linear;
            filter: blur(40px);
        }

        .bg-element:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--neon-green);
            top: 10%;
            left: 5%;
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .bg-element:nth-child(2) {
            width: 300px;
            height: 300px;
            background: var(--neon-red);
            top: 60%;
            left: 80%;
            animation-delay: 5s;
            animation-duration: 30s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(50px, -80px) rotate(120deg); }
            66% { transform: translate(-30px, 40px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .bulgarian-pattern {
            background-image: 
                linear-gradient(45deg, var(--neon-green) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--neon-green) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--neon-red) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--neon-red) 75%);
            background-size: 30px 30px;
            background-position: 0 0, 0 15px, 15px -15px, -15px 0px;
            opacity: 0.03;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Навигация */
        .edit-nav {
            max-width: 500px;
            margin: 100px auto 20px;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: rgba(21, 21, 34, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-green);
            border-radius: 50px;
            color: var(--neon-green);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
            position: relative;
            overflow: hidden;
        }

        .back-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 157, 0.2), transparent);
            transition: var(--transition);
        }

        .back-btn:hover::before {
            left: 100%;
        }

        .back-btn:hover {
            background: var(--neon-green);
            color: var(--dark);
            transform: translateX(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.4);
        }

        .back-btn i {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .back-btn:hover i {
            transform: translateX(-3px);
        }

        .edit-container {
            max-width: 500px;
            margin: 20px auto 60px;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .edit-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .edit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-green), var(--neon-red), transparent);
            animation: flagMove 3s infinite linear;
            opacity: 0.5;
        }

        .edit-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .edit-title {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(45deg, var(--white), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .edit-subtitle {
            color: #b0b0d0;
            font-size: 1.1rem;
        }

        /* Формуляр */
        .edit-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: var(--white);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            color: var(--neon-green);
            font-size: 1rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(0, 255, 157, 0.2);
            border-radius: 15px;
            color: var(--white);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            backdrop-filter: blur(5px);
        }

        input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        input:hover {
            border-color: rgba(0, 255, 157, 0.4);
        }

        .input-icon {
            position: absolute;
            right: 20px;
            color: var(--neon-green);
            font-size: 1.1rem;
            pointer-events: none;
        }

        #togglePassword {
            pointer-events: all;
            cursor: pointer;
        }

        .password-strength {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .strength-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            gap: 4px;
        }

        .strength-segment {
            flex: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }

        .strength-segment.active:nth-child(1) { background: var(--neon-red); }
        .strength-segment.active:nth-child(2) { background: #ffaa00; }
        .strength-segment.active:nth-child(3) { background: var(--neon-green); }
        .strength-segment.active:nth-child(4) { background: var(--neon-green); }

        .strength-text {
            font-size: 0.85rem;
            color: #b0b0d0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .strength-text i {
            color: var(--neon-green);
        }

        /* Действия */
        .form-actions {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 255, 157, 0.1);
        }

        .btn {
            padding: 16px 32px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            flex: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: var(--transition);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-green), var(--green));
            color: var(--dark);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 157, 0.6);
        }

        .btn-outline {
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            background: transparent;
            text-shadow: 0 0 5px var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
        }

        .btn-outline:hover {
            color: var(--dark);
            background: var(--neon-green);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 255, 157, 0.5);
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: var(--neon-green);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark-secondary);
            border-left: 4px solid var(--neon-green);
            border-radius: 10px;
            padding: 15px 25px;
            color: var(--white);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--neon-green);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            border-left-color: var(--neon-red);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--neon-red);
        }

        /* Responsive дизайн */
        @media (max-width: 768px) {
            .edit-nav {
                margin: 80px auto 15px;
            }

            .back-btn {
                padding: 12px 24px;
                font-size: 1rem;
            }

            .edit-card {
                padding: 30px;
            }

            .edit-title {
                font-size: 2.2rem;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .edit-nav {
                margin: 70px auto 10px;
                padding: 0 15px;
            }

            .back-btn {
                padding: 10px 20px;
                font-size: 0.95rem;
                width: 100%;
                justify-content: center;
            }

            .edit-container {
                padding: 0 15px;
            }

            .edit-card {
                padding: 25px 20px;
            }

            .edit-title {
                font-size: 1.8rem;
            }

            .edit-subtitle {
                font-size: 0.95rem;
            }

            input {
                padding: 14px 16px;
                font-size: 0.95rem;
            }

            .toast {
                left: 20px;
                right: 20px;
                bottom: 20px;
                transform: translateY(100px);
            }

            .toast.show {
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="animated-bg">
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
    </div>
    <div class="bulgarian-pattern"></div>

    <!-- Навигация -->
    <nav class="edit-nav">
        <a href="javascript:history.back()" class="back-btn" id="backBtn">
            <i class="fas fa-arrow-left"></i>
            <span>Назад към профила</span>
        </a>
    </nav>

    <main class="edit-container">
        <div class="edit-card">
            <div class="edit-header">
                <h1 class="edit-title">Редактиране на профил</h1>
                <p class="edit-subtitle">Актуализирайте вашата информация</p>
            </div>

            <!-- Формуляр за редактиране -->
            <form class="edit-form" id="editForm">
                <!-- Потребителско име -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>
                        Потребителско име
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="Въведете потребителско име" value="kiril_ivanov">
                        <i class="fas fa-user input-icon"></i>
                    </div>
                </div>

                <!-- Имейл -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i>
                        Имейл адрес
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="Въведете имейл" value="kiril@example.com">
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <!-- Смяна на парола (опционално) -->
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        Нова парола (оставете празно за да запазите старата)
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" placeholder="Въведете нова парола">
                        <i class="fas fa-eye input-icon" id="togglePassword"></i>
                    </div>
                    
                    <div class="password-strength" id="passwordStrength" style="display: none;">
                        <div class="strength-bar">
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                            <div class="strength-segment"></div>
                        </div>
                        <div class="strength-text">
                            <i class="fas fa-shield-alt"></i>
                            <span id="strengthMessage">Слаба парола</span>
                        </div>
                    </div>
                </div>

                <!-- Действия -->
                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="cancelBtn">
                        <i class="fas fa-times"></i>
                        Отказ
                    </button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">
                        <span id="saveBtnText">Запази промените</span>
                        <span class="loader" id="saveLoader" style="display: none;"></span>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- Toast известия -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        // Проверка за логнат потребител
        const userJson = sessionStorage.getItem('user');
        if (!userJson || userJson === 'undefined' || userJson === 'null') {
            window.location.href = 'login.html';
        }

        let currentUser = null;

        // Зареждане на потребителски данни
        function loadUserData() {
            try {
                currentUser = JSON.parse(userJson);
                
                // Попълваме формуляра с данни
                if (currentUser.username) {
                    document.getElementById('username').value = currentUser.username;
                }
                if (currentUser.email) {
                    document.getElementById('email').value = currentUser.email;
                }
                
            } catch (e) {
                console.error('Грешка при зареждане на потребител:', e);
                showToast('Грешка при зареждане на профила', true);
            }
        }

        // Показване на toast
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            if (isError) {
                toast.classList.add('error');
            } else {
                toast.classList.remove('error');
            }
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Бутон за назад
        document.getElementById('backBtn').addEventListener('click', function(e) {
            e.preventDefault();
            if (document.referrer) {
                history.back();
            } else {
                window.location.href = 'profile.html';
            }
        });

        // Бутон за отказ
        document.getElementById('cancelBtn').addEventListener('click', () => {
            window.location.href = 'profile.html';
        });

        // Показване/скриване на парола
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('newPassword');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Проверка за сила на паролата
        document.getElementById('newPassword').addEventListener('input', function() {
            const password = this.value;
            const strengthDiv = document.getElementById('passwordStrength');
            const segments = document.querySelectorAll('.strength-segment');
            const message = document.getElementById('strengthMessage');
            
            if (password.length === 0) {
                strengthDiv.style.display = 'none';
                return;
            }
            
            strengthDiv.style.display = 'block';
            
            let strength = 0;
            
            // Проверки за сила
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;
            
            // Нормализиране до 4 сегмента
            strength = Math.min(4, Math.floor(strength * 0.8));
            
            // Актуализиране на сегментите
            segments.forEach((seg, index) => {
                if (index < strength) {
                    seg.classList.add('active');
                } else {
                    seg.classList.remove('active');
                }
            });
            
            // Съобщение за сила
            const messages = ['Много слаба', 'Слаба', 'Средна', 'Добра', 'Силна'];
            message.textContent = messages[strength];
        });

        // Валидация на имейл
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        // Запазване на промените
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Взимаме стойностите
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            
            // Валидации
            if (!username) {
                showToast('Моля въведете потребителско име!', true);
                return;
            }
            
            if (!email) {
                showToast('Моля въведете имейл адрес!', true);
                return;
            }
            
            if (!validateEmail(email)) {
                showToast('Моля въведете валиден имейл адрес!', true);
                return;
            }
            
            // Показваме loader
            document.getElementById('saveBtnText').style.display = 'none';
            document.getElementById('saveLoader').style.display = 'inline-block';
            document.getElementById('saveBtn').disabled = true;
            
            try {
                // Симулираме API заявка
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // Актуализираме sessionStorage с новите данни
                if (currentUser) {
                    currentUser.username = username;
                    currentUser.email = email;
                    sessionStorage.setItem('user', JSON.stringify(currentUser));
                }
                
                showToast('Профилът е актуализиран успешно!');
                
                // Връщаме се към профила след малко
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1500);
                
            } catch (error) {
                showToast('Грешка при запазване на промените!', true);
                
                // Скриваме loader
                document.getElementById('saveBtnText').style.display = 'inline';
                document.getElementById('saveLoader').style.display = 'none';
                document.getElementById('saveBtn').disabled = false;
            }
        });

        // Зареждаме данните
        loadUserData();

        // Периодична проверка за сесия
        setInterval(() => {
            const currentUser = sessionStorage.getItem('user');
            if (!currentUser || currentUser === 'undefined' || currentUser === 'null') {
                window.location.href = 'login.html';
            }
        }, 1000);
    </script>
</body>
</html>
