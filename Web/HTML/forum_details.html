<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiriliX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/notification.css">
    <link rel="stylesheet" href="../CSS/forum_details.css">
    <style>
        .author-avatar-large {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
            transition: var(--transition);
        }
        
        .author-avatar-large:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 157, 0.5);
            border-color: var(--neon-red);
        }
        
        .comment-author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
        }
        
        .forum-author-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .author-details h4 {
            margin: 0;
            font-size: 1.1rem;
            color: var(--white);
        }
        
        .author-details p {
            margin: 5px 0 0;
            font-size: 0.85rem;
            color: var(--neon-green);
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            .author-avatar-large {
                width: 50px;
                height: 50px;
            }
            
            .comment-author-avatar {
                width: 35px;
                height: 35px;
            }
        }
        
        @media (max-width: 480px) {
            .author-avatar-large {
                width: 45px;
                height: 45px;
            }
            
            .comment-author-avatar {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="alert-container" id="alert-container"></div>

    <div class="animated-bg">
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
    </div>
    
    <div class="bulgarian-pattern"></div>
    
    <div class="bulgarian-border"></div>

    <main class="forum-detail-container" id="mainContainer">
        <a href="forum.html" class="back-button fade-in">
            <i class="fas fa-arrow-left"></i>
            Обратно към всички теми
        </a>
        
        <div class="forum-detail-header fade-in delay-1" id="forumHeader">
            <h1 class="forum-detail-title" id="forumTitle">Зареждане...</h1>
            
            <div class="forum-detail-meta">
                <div class="forum-author-info">
                    <img class="author-avatar-large" id="forumAuthorAvatar" src="../Assets/Images/bronze_logo.png" alt="Author Avatar">
                    <div class="author-details">
                        <h4 id="forumAuthor">Зареждане...</h4>
                        <p id="forumDate">Зареждане...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <article class="forum-detail-content fade-in delay-1" id="forumContent">
            <p style="text-align: center;">Зареждане на съдържанието...</p>
        </article>
        
        <section class="comments-section fade-in" id="commentsSection">
            <h2 class="comments-title">
                <i class="far fa-comments"></i>
                Коментари
                <span class="comments-count" id="commentsCount">(0)</span>
            </h2>
            
            <div class="comment-form" id="commentForm">
                <h3 class="form-title">
                    <i class="far fa-edit"></i>
                    Добави коментар
                </h3>
                <form id="newCommentForm" onsubmit="event.preventDefault(); submitComment();">
                    <div class="form-group">
                        <label for="commentContent" class="form-label">Твоят коментар</label>
                        <textarea 
                            class="form-textarea" 
                            id="commentContent" 
                            placeholder="Напиши нещо..."
                            required
                        ></textarea>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" id="submitCommentBtn">
                            <i class="fas fa-paper-plane"></i>
                            Публикувай
                        </button>
                    </div>
                </form>
            </div>
            
            <ul class="comments-list" id="commentsList"></ul>
        </section>
    </main>
    
    <script src="../JS/notification_system.js"></script>
    <script src="../JS/config.js"></script>
    <script src="../JS/forum_details.js"></script>
    </body>
</html>
