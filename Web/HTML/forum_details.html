<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiriliX | Детайли на тема</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --neon-green: #00ff9d;
            --neon-red: #ff003c;
            --green: #00cc7a;
            --red: #e60033;
            --dark: #0a0a14;
            --dark-secondary: #151522;
            --purple: #8a2be2;
            --cyan: #00f3ff;
            --yellow: #ffcc00;
            --orange: #ff7b00;
            --shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 157, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(138, 43, 226, 0.03) 0%, transparent 50%),
                linear-gradient(45deg, var(--dark) 0%, #0d0f1a 100%);
        }

        .bg-element {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 15s infinite linear;
            filter: blur(40px);
        }

        .bg-element:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--neon-green);
            top: 10%;
            left: 5%;
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .bg-element:nth-child(2) {
            width: 300px;
            height: 300px;
            background: var(--neon-red);
            top: 60%;
            left: 80%;
            animation-delay: 5s;
            animation-duration: 30s;
        }

        .bg-element:nth-child(3) {
            width: 500px;
            height: 500px;
            background: var(--neon-green);
            top: 70%;
            left: 10%;
            animation-delay: 10s;
            animation-duration: 35s;
        }

        .bg-element:nth-child(4) {
            width: 200px;
            height: 200px;
            background: var(--neon-red);
            top: 20%;
            left: 70%;
            animation-delay: 15s;
            animation-duration: 20s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            33% {
                transform: translate(50px, -80px) rotate(120deg);
            }
            66% {
                transform: translate(-30px, 40px) rotate(240deg);
            }
            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        .bulgarian-pattern {
            background-image: 
                linear-gradient(45deg, var(--neon-green) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--neon-green) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--neon-red) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--neon-red) 75%);
            background-size: 30px 30px;
            background-position: 0 0, 0 15px, 15px -15px, -15px 0px;
            opacity: 0.03;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bulgarian-border {
            height: 4px;
            background: linear-gradient(90deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            box-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-red);
        }

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            animation: rotate 2s linear infinite;
            box-shadow: 
                0 0 30px var(--neon-green),
                0 0 60px var(--neon-red),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .loader-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: conic-gradient(
                var(--white) 0deg 120deg,
                var(--neon-green) 120deg 240deg,
                var(--neon-red) 240deg 360deg
            );
            border-radius: 50%;
            filter: brightness(1.2);
        }

        .loader-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: var(--dark);
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .loader-letter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--neon-green);
            z-index: 10;
            text-shadow: 
                0 0 10px var(--neon-green),
                0 0 20px var(--neon-green),
                0 0 40px var(--neon-green);
            animation: letterPulse 1.5s ease-in-out infinite;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
                filter: hue-rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
                filter: hue-rotate(360deg);
            }
        }

        @keyframes letterPulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
                text-shadow: 
                    0 0 10px var(--neon-green),
                    0 0 20px var(--neon-green),
                    0 0 40px var(--neon-green);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.9;
                text-shadow: 
                    0 0 15px var(--neon-green),
                    0 0 30px var(--neon-green),
                    0 0 60px var(--neon-green);
            }
        }

        .loader-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--neon-green);
            text-align: center;
            margin-top: 2rem;
            text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 2px;
        }

        .loader-text::after {
            content: '';
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
            100% { content: '.'; }
        }

        .forum-detail-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
            position: relative;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--neon-green);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .back-button:hover {
            background: rgba(0, 255, 157, 0.2);
            transform: translateX(-5px);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
        }

        .forum-detail-header {
            margin-bottom: 3rem;
        }

        .forum-detail-title {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: var(--white);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .forum-detail-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .forum-author-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .author-avatar-large {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-weight: 700;
            font-size: 1.5rem;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .author-details h4 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .author-details p {
            color: #b0b0d0;
            font-size: 0.9rem;
        }

        .forum-detail-content {
            background: rgba(21, 21, 34, 0.7);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 157, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            margin-bottom: 4rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        .forum-detail-content p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.8;
            color: #e0e0f0;
        }

        .forum-detail-content h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin: 2.5rem 0 1.5rem;
            color: var(--white);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(0, 255, 157, 0.3);
        }

        .forum-detail-content h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 2rem 0 1rem;
            color: var(--white);
        }

        .forum-detail-content ul, .forum-detail-content ol {
            margin-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .forum-detail-content li {
            margin-bottom: 0.8rem;
            color: #e0e0f0;
            line-height: 1.7;
        }

        .forum-detail-content code {
            background: rgba(0, 0, 0, 0.3);
            color: var(--neon-green);
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            font-family: monospace;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }

        .forum-detail-content a {
            color: var(--neon-green);
            text-decoration: none;
            border-bottom: 1px solid rgba(0, 255, 157, 0.3);
            transition: var(--transition);
        }

        .forum-detail-content a:hover {
            color: var(--cyan);
            border-bottom-color: var(--cyan);
            text-shadow: 0 0 10px var(--cyan);
        }

        .comments-section {
            background: rgba(21, 21, 34, 0.7);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 157, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            margin-bottom: 4rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .comments-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--white);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .comments-title i {
            color: var(--neon-green);
        }

        .comments-count {
            color: var(--neon-green);
            font-size: 1.2rem;
            margin-left: 0.5rem;
        }

        .comment-form {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 2rem;
            margin-bottom: 3rem;
            border: 1px solid rgba(0, 255, 157, 0.1);
        }

        .form-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--white);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #b0b0d0;
            font-weight: 500;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 10px;
            color: var(--white);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }

        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.2);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            min-width: 180px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-green) 0%, var(--green) 100%);
            color: var(--dark);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary i {
            font-size: 1.1rem;
            transition: transform 0.3s ease;
        }

        .btn-primary:hover i {
            transform: translateX(5px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            border: 1px solid rgba(0, 255, 157, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(0, 255, 157, 0.1);
            border-color: var(--neon-green);
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--neon-red) 0%, var(--red) 100%);
            color: var(--white);
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 0, 60, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .comments-list {
            list-style: none;
        }

        .comment-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0, 255, 157, 0.05);
            transition: var(--transition);
        }

        .comment-item:hover {
            border-color: rgba(0, 255, 157, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .comment-author {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .comment-author-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-weight: 600;
            font-size: 1rem;
        }

        .comment-author-info h5 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
            color: var(--white);
        }

        .comment-author-info p {
            font-size: 0.9rem;
            color: #b0b0d0;
        }

        .comment-content {
            color: #e0e0f0;
            line-height: 1.7;
            margin-bottom: 1rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }

        .pagination-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 45px;
            height: 45px;
            padding: 0 0.8rem;
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 10px;
            color: var(--white);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
        }

        .pagination-btn:hover {
            background: rgba(0, 255, 157, 0.2);
            border-color: var(--neon-green);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.2);
        }

        .pagination-btn.active {
            background: var(--neon-green);
            color: var(--dark);
            border-color: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
        }

        .pagination-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .pagination-dots {
            color: var(--neon-green);
            font-weight: 600;
            padding: 0 0.3rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        .delay-1 {
            animation-delay: 0.2s;
        }

        .delay-2 {
            animation-delay: 0.4s;
        }

        .delay-3 {
            animation-delay: 0.6s;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .toast-message {
            position: fixed;
            top: 100px;
            right: 20px;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            min-width: 300px;
            max-width: 400px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1200;
        }

        .toast-success {
            background: rgba(0, 255, 157, 0.2);
            border: 1px solid var(--neon-green);
        }

        .toast-error {
            background: rgba(255, 0, 60, 0.2);
            border: 1px solid var(--neon-red);
        }

        .toast-warning {
            background: rgba(255, 204, 0, 0.2);
            border: 1px solid var(--yellow);
        }

        .toast-info {
            background: rgba(0, 243, 255, 0.2);
            border: 1px solid var(--cyan);
        }

        .toast-content {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--white);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
            transition: all 0.3s ease;
        }

        .toast-close:hover {
            color: var(--neon-green);
            transform: scale(1.1);
        }

        .error-container {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 0, 60, 0.1);
            border: 1px solid var(--neon-red);
            border-radius: 20px;
            margin: 2rem 0;
        }

        .error-container i {
            font-size: 4rem;
            color: var(--neon-red);
            margin-bottom: 1rem;
        }

        .error-container h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--white);
        }

        .error-container p {
            color: #b0b0d0;
            margin-bottom: 2rem;
        }

        .error-container .btn {
            display: inline-flex;
        }

        @media (max-width: 1024px) {
            .forum-detail-title {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) {
            .forum-detail-container {
                padding: 1.5rem 1.5rem 2rem;
            }
            
            .forum-detail-title {
                font-size: 2rem;
            }
            
            .forum-detail-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 1.5rem;
            }
            
            .forum-detail-content {
                padding: 2rem;
            }
            
            .comments-section {
                padding: 2rem;
            }
            
            .pagination {
                gap: 0.5rem;
            }
            
            .pagination-btn {
                min-width: 40px;
                height: 40px;
                font-size: 0.9rem;
            }

            .btn {
                min-width: 150px;
                padding: 0.8rem 1.5rem;
            }

            .toast-message {
                top: 80px;
                right: 10px;
                left: 10px;
                min-width: auto;
                max-width: none;
            }
        }

        @media (max-width: 480px) {
            .forum-detail-container {
                padding: 1rem 1rem 1.5rem;
            }
            
            .forum-detail-title {
                font-size: 1.8rem;
            }
            
            .forum-detail-content {
                padding: 1.5rem;
            }
            
            .comments-section {
                padding: 1.5rem;
            }
            
            .comment-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            
            .pagination {
                gap: 0.3rem;
            }
            
            .pagination-btn {
                min-width: 35px;
                height: 35px;
                font-size: 0.8rem;
            }

            .btn {
                min-width: 120px;
                padding: 0.7rem 1rem;
                font-size: 0.9rem;
            }
        }

        .admin-badge {
            background: linear-gradient(135deg, var(--neon-red), var(--orange));
            color: var(--white);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px var(--neon-red);
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-container">
            <div class="loader-circle"></div>
            <div class="loader-letter" id="loaderLetter">Т</div>
        </div>
        <div class="loader-text">Зареждане на темата</div>
    </div>
    
    <div class="animated-bg">
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
    </div>
    
    <div class="bulgarian-pattern"></div>
    
    <div class="bulgarian-border"></div>

    <main class="forum-detail-container" id="mainContainer">
        <!-- Бутон за връщане назад -->
        <a href="forum.html" class="back-button fade-in">
            <i class="fas fa-arrow-left"></i>
            Обратно към всички теми
        </a>
        
        <!-- Заглавие и мета информация - ще се показват само ако има валидно ID -->
        <div class="forum-detail-header fade-in delay-1" id="forumHeader">
            <h1 class="forum-detail-title" id="forumTitle">Зареждане...</h1>
            
            <div class="forum-detail-meta">
                <div class="forum-author-info">
                    <div class="author-avatar-large" id="forumAuthorAvatar">--</div>
                    <div class="author-details">
                        <h4 id="forumAuthor">Зареждане...</h4>
                        <p id="forumDate">Зареждане...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Основно съдържание - ще се показва само ако има валидно ID -->
        <article class="forum-detail-content fade-in delay-1" id="forumContent">
            <p style="text-align: center;">Зареждане на съдържанието...</p>
        </article>
        
        <!-- Секция с коментари - ще се показва само ако има валидно ID -->
        <section class="comments-section fade-in" id="commentsSection">
            <h2 class="comments-title">
                <i class="far fa-comments"></i>
                Коментари
                <span class="comments-count" id="commentsCount">(0)</span>
            </h2>
            
            <!-- Форма за добавяне на коментар -->
            <div class="comment-form" id="commentForm">
                <h3 class="form-title">
                    <i class="far fa-edit"></i>
                    Добави коментар
                </h3>
                <form id="newCommentForm" onsubmit="event.preventDefault(); submitComment();">
                    <div class="form-group">
                        <label for="commentContent" class="form-label">Твоят коментар</label>
                        <textarea 
                            class="form-textarea" 
                            id="commentContent" 
                            placeholder="Напиши нещо..."
                            required
                        ></textarea>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary" id="submitCommentBtn">
                            <i class="fas fa-paper-plane"></i>
                            Публикувай
                        </button>
                    </div>
                </form>
            </div>
            
            <!-- Списък с коментари -->
            <ul class="comments-list" id="commentsList">
                <!-- Коментарите ще се зареждат от post.Comments -->
            </ul>
        </section>
    </main>
    <script src="../JS/config.js"></script>
    <script>
        
        // Глобални променливи
        let currentPostId = null;
        let currentUser = null;
        let currentPost = null;

        // Loader functionality
        window.addEventListener('load', function() {
            // Вземане на ID на публикацията от URL параметрите
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            
            // Валидация на ID
            if (!postId || postId.trim() === '') {
                showError('Липсващ ID', 'Моля, посочете ID на публикацията в URL адреса.<br>Пример: post_details.html?id=123');
                return;
            }
            
            // Проверка дали ID е валидно число
            if (isNaN(postId) || parseInt(postId) <= 0) {
                showError('Невалидно ID', 'Посоченото ID не е валидно число.<br>Моля, проверете URL адреса.');
                return;
            }
            
            // Запазване на ID
            currentPostId = parseInt(postId);
            
            // ВЗИМАНЕ НА ПОТРЕБИТЕЛ САМО ОТ СЕСИЯТА
            try {
                const sessionUser = sessionStorage.getItem('user');
                if (sessionUser) {
                    currentUser = JSON.parse(sessionUser);
                    console.log('Потребител зареден от сесията:', currentUser.username, 'Роля:', currentUser.role);
                } else {
                    console.log('Няма логнат потребител в сесията');
                }
            } catch (e) {
                console.warn('Грешка при четене от сесията:', e);
            }
            
            loadPostDetails(currentPostId);
        });

        async function loadPostDetails(postId) {
            try {
                document.getElementById('loader').classList.remove('hidden');
                
                const response = await fetch(`${API_CONFIG.POST}/${postId}?useNavigationalProperties=true`);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        const errorData = await response.json();
                        throw new Error(errorData.message || 'Публикацията не е намерена');
                    } else if (response.status === 400) {
                        const errorData = await response.json();
                        throw new Error(errorData.message || 'Невалидна заявка');
                    } else {
                        throw new Error(`Грешка при зареждане: ${response.status}`);
                    }
                }
                
                const post = await response.json();
                currentPost = post; // Запазваме поста за по-късно
                
                // Скриване на loader
                document.getElementById('loader').classList.add('hidden');
                
                // Задаване на заглавието на страницата
                document.title = `KiriliX | ${post.title || 'Без заглавие'}`;
                
                // Показване на данните за публикацията
                document.getElementById('forumTitle').textContent = post.title || 'Без заглавие';
                
                // Обработка на автора
                let authorName = 'Неизвестен автор';
                let authorInitials = '--';
                
                if (post.author) {
                    authorName = post.author.username || 'Неизвестен автор';
                    authorInitials = getInitials(post.author.username) || getInitials(post.author.email) || '??';
                }
                
                document.getElementById('forumAuthor').textContent = authorName;
                document.getElementById('forumAuthorAvatar').textContent = authorInitials;
                
                // Форматиране на датата според часовата зона на устройството
                let dateText = 'Неизвестна дата';
                if (post.createdAt) {
                    try {
                        const date = new Date(post.createdAt);
                        if (!isNaN(date.getTime())) {
                            dateText = formatDeviceDate(date);
                        }
                    } catch (e) {
                        console.warn('Грешка при форматиране на дата:', e);
                    }
                }
                document.getElementById('forumDate').textContent = dateText;
                
                // Показване на съдържанието (поддържа HTML)
                document.getElementById('forumContent').innerHTML = post.content || '<p>Няма съдържание</p>';
                
                // Показване на коментарите с конвертирани дати
                displayComments(post.comments || []);
                
            } catch (error) {
                console.error('Грешка при зареждане на публикация:', error);
                document.getElementById('loader').classList.add('hidden');
                showError('Грешка при зареждане', error.message);
            }
        }

        // Показване на коментарите
        function displayComments(comments) {
            const commentsCount = document.getElementById('commentsCount');
            const commentsList = document.getElementById('commentsList');
            
            if (!comments || comments.length === 0) {
                commentsCount.textContent = '(0)';
                commentsList.innerHTML = '<li class="comment-item" style="text-align: center; list-style: none;">Няма коментари все още. Бъди първият!</li>';
                return;
            }
            
            commentsCount.textContent = `(${comments.length})`;
            
            let commentsHtml = '';
            comments.forEach(comment => {
                // Генериране на инициали за аватара на коментара
                let authorInitials = '--';
                let authorName = 'Неизвестен потребител';
                let isAdmin = false;
                
                if (comment.author) {
                    // Проверка за администратор (role: 0)
                    if (comment.author.role === 0) {
                        authorName = 'Администратор';
                        isAdmin = true;
                        authorInitials = 'A';
                    } else {
                        authorName = comment.author.username || 'Неизвестен потребител';
                        authorInitials = getInitials(comment.author.username) || getInitials(comment.author.email) || '??';
                    }
                }
                
                // Форматиране на датата на коментара според часовата зона на устройството
                let dateText = 'Неизвестна дата';
                if (comment.createdAt) {
                    try {
                        const date = new Date(comment.createdAt);
                        if (!isNaN(date.getTime())) {
                            dateText = formatDeviceDate(date);
                        }
                    } catch (e) {
                        console.warn('Грешка при форматиране на дата:', e);
                    }
                }
                
                commentsHtml += `
                    <li class="comment-item" data-comment-id="${comment.id || ''}" style="list-style: none;">
                        <div class="comment-header">
                            <div class="comment-author">
                                <div class="comment-author-avatar">${authorInitials}</div>
                                <div class="comment-author-info">
                                    <h5>${authorName} ${isAdmin ? '<span class="admin-badge">Админ</span>' : ''}</h5>
                                    <p>${dateText}</p>
                                </div>
                            </div>
                        </div>
                        <div class="comment-content">
                            ${comment.content || 'Няма съдържание'}
                        </div>
                    </li>
                `;
            });
            
            commentsList.innerHTML = commentsHtml;
        }

        // Функция за форматиране на дата според часовата зона на устройството
        function formatDeviceDate(date) {
            if (!date || !(date instanceof Date) || isNaN(date.getTime())) {
                return 'Невалидна дата';
            }
            
            // Използваме часовата зона на устройството (по подразбиране)
            const options = { 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            };
            
            try {
                return date.toLocaleDateString('bg-BG', options);
            } catch (e) {
                // Ако не може да форматира на български, използваме без език
                return date.toLocaleDateString(undefined, options);
            }
        }

        // Функция за изпращане на коментар - ПРАЩАМЕ Author и Post
        async function submitComment() {
            const contentInput = document.getElementById('commentContent');
            const content = contentInput.value.trim();
            const submitBtn = document.getElementById('submitCommentBtn');
            
            if (!content) {
                showToast('Моля, въведете съдържание на коментара', 'warning');
                return;
            }
            
            // Проверка дали потребителят е логнат (от сесията)
            if (!currentUser) {
                showToast('Трябва да сте влезли в профила си, за да коментирате', 'warning');
                return;
            }
            
            // Проверка дали имаме валиден postId
            if (!currentPostId) {
                showToast('Грешка: Няма заредена публикация', 'error');
                return;
            }
            
            // Проверка дали имаме текущия пост
            if (!currentPost) {
                showToast('Грешка: Няма информация за публикацията', 'error');
                return;
            }
            
            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Изпращане...';
                
                const commentData = {
                    content: content,
                    author: currentUser,      
                    post: currentPost       
                };
                
                console.log('Изпращам коментар:', commentData);
                
                const response = await fetch(API_CONFIG.COMMENT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(commentData)
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Грешка при изпращане на коментар');
                }
                
                showToast('Коментарът беше добавен успешно!', 'success');
                
                contentInput.value = '';
                
                await loadPostDetails(currentPostId);
                
            } catch (error) {
                console.error('Грешка при изпращане на коментар:', error);
                showToast(error.message || 'Грешка при изпращане на коментар', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Публикувай';
            }
        }

        function getInitials(name) {
            if (!name || typeof name !== 'string') return '??';
            
            name = name.trim();
            if (name === '') return '??';
            
            if (name.includes('@')) {
                return name.charAt(0).toUpperCase();
            }
            
            const parts = name.split(' ').filter(p => p.length > 0);
            if (parts.length >= 2) {
                return (parts[0].charAt(0) + parts[1].charAt(0)).toUpperCase();
            }
            return name.charAt(0).toUpperCase();
        }

        function showToast(message, type = 'info') {
            const oldToast = document.querySelector('.toast-message');
            if (oldToast) oldToast.remove();
            
            const toast = document.createElement('div');
            toast.className = `toast-message toast-${type}`;
            
            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle';
            if (type === 'error') icon = 'exclamation-circle';
            if (type === 'warning') icon = 'exclamation-triangle';
            
            toast.innerHTML = `
                <div class="toast-content">
                    <i class="fas fa-${icon}"></i>
                    <span>${message}</span>
                </div>
                <button class="toast-close">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transform = 'translateX(0)';
            }, 100);
            
            setTimeout(() => {
                toast.style.transform = 'translateX(150%)';
                setTimeout(() => toast.remove(), 400);
            }, 5000);
            
            const closeBtn = toast.querySelector('.toast-close');
            closeBtn.addEventListener('click', () => {
                toast.style.transform = 'translateX(150%)';
                setTimeout(() => toast.remove(), 400);
            });
        }

        function showError(title, message) {
            // Скриване на loader
            document.getElementById('loader').classList.add('hidden');
            
            // Скриване на нормалното съдържание
            document.getElementById('forumHeader').style.display = 'none';
            document.getElementById('forumContent').style.display = 'none';
            document.getElementById('commentsSection').style.display = 'none';
            
            // Показване на грешка
            const container = document.getElementById('mainContainer');
            
            // Проверка дали вече има error container
            let errorContainer = document.querySelector('.error-container');
            if (errorContainer) {
                errorContainer.remove();
            }
            
            errorContainer = document.createElement('div');
            errorContainer.className = 'error-container';
            errorContainer.innerHTML = `
                <i class="fas fa-exclamation-triangle"></i>
                <h2>${title || 'Грешка'}</h2>
                <p>${message || 'Възникна неочаквана грешка'}</p>
                <a href="forum.html" class="btn btn-primary">
                    <i class="fas fa-arrow-left"></i>
                    Обратно към форума
                </a>
            `;
            
            container.appendChild(errorContainer);
        }

        // Add click effect to buttons
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', function(e) {
                if (this.disabled) return;
                
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.classList.add('ripple');
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });
    </script>
</body>
</html>
