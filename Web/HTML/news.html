<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiriliX | Новини и събития</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --neon-green: #00ff9d;
            --neon-red: #ff003c;
            --green: #00cc7a;
            --red: #e60033;
            --dark: #0a0a14;
            --dark-secondary: #151522;
            --purple: #8a2be2;
            --cyan: #00f3ff;
            --yellow: #ffcc00;
            --orange: #ff7b00;
            --shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 157, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(138, 43, 226, 0.03) 0%, transparent 50%),
                linear-gradient(45deg, var(--dark) 0%, #0d0f1a 100%);
        }

        .bulgarian-border {
            height: 4px;
            background: linear-gradient(90deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            box-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-red);
        }

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            animation: rotate 2s linear infinite;
            box-shadow: 
                0 0 30px var(--neon-green),
                0 0 60px var(--neon-red),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .loader-circle::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: conic-gradient(
                var(--white) 0deg 120deg,
                var(--neon-green) 120deg 240deg,
                var(--neon-red) 240deg 360deg
            );
            border-radius: 50%;
            filter: brightness(1.2);
        }

        .loader-circle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: var(--dark);
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .loader-letter {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Inter', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--neon-green);
            z-index: 10;
            text-shadow: 
                0 0 10px var(--neon-green),
                0 0 20px var(--neon-green),
                0 0 40px var(--neon-green);
            animation: letterPulse 1.5s ease-in-out infinite;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
                filter: hue-rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
                filter: hue-rotate(360deg);
            }
        }

        @keyframes letterPulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
                text-shadow: 
                    0 0 10px var(--neon-green),
                    0 0 20px var(--neon-green),
                    0 0 40px var(--neon-green);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.9;
                text-shadow: 
                    0 0 15px var(--neon-green),
                    0 0 30px var(--neon-green),
                    0 0 60px var(--neon-green);
            }
        }

        .loader-text {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--neon-green);
            text-align: center;
            margin-top: 2rem;
            text-shadow: 0 0 10px var(--neon-green);
            letter-spacing: 2px;
        }

        .loader-text::after {
            content: '';
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
            100% { content: '.'; }
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 255, 157, 0.1);
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
            text-decoration: none;
            z-index: 1001;
            text-shadow: 0 0 10px var(--neon-green);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-weight: 700;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 15px var(--neon-green),
                0 0 30px var(--neon-red);
            animation: logoGlow 3s infinite alternate;
        }

        @keyframes logoGlow {
            0% {
                box-shadow: 
                    0 0 15px var(--neon-green),
                    0 0 30px var(--neon-red);
            }
            100% {
                box-shadow: 
                    0 0 25px var(--neon-green),
                    0 0 50px var(--neon-red),
                    0 0 75px var(--purple);
            }
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-link {
            color: var(--white);
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: var(--transition);
            padding: 0.5rem 0;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            transition: var(--transition);
            box-shadow: 0 0 10px var(--neon-green);
        }

        .nav-link:hover {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.8rem 1.8rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }

        .btn-outline {
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            background: transparent;
            text-shadow: 0 0 5px var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
        }

        .btn-outline:hover {
            color: var(--dark);
            background: var(--neon-green);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 255, 157, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-green), var(--green));
            color: var(--dark);
            border: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 157, 0.6);
        }

        .news-hero {
            padding: 12rem 2rem 5rem;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
        }

        .news-hero-content {
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
        }

        .news-hero-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 255, 157, 0.1);
            color: var(--neon-green);
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 157, 0.3);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
        }

        .news-hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: var(--white);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .news-hero-title span {
            background: linear-gradient(45deg, var(--neon-green), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            animation: textGlow 2s infinite alternate;
        }

        @keyframes textGlow {
            0% {
                filter: drop-shadow(0 0 10px var(--neon-green));
            }
            100% {
                filter: drop-shadow(0 0 20px var(--neon-green)) drop-shadow(0 0 40px var(--purple));
            }
        }

        .news-hero-description {
            font-size: 1.2rem;
            color: #b0b0d0;
            max-width: 700px;
            margin: 0 auto 3rem;
            line-height: 1.8;
        }

        .news-stats {
            display: flex;
            justify-content: center;
            gap: 4rem;
            margin-top: 4rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(21, 21, 34, 0.6);
            border-radius: 15px;
            padding: 1.5rem 2.5rem;
            text-align: center;
            border: 1px solid rgba(0, 255, 157, 0.1);
            min-width: 180px;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 255, 157, 0.2);
            border-color: var(--neon-green);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #b0b0d0;
        }

        .news-content {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .section-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0, 255, 157, 0.2);
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--white);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .search-container {
            position: relative;
            margin-bottom: 3rem;
        }

        .search-input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            padding-left: 3.5rem;
            background: rgba(21, 21, 34, 0.8);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 15px;
            color: var(--white);
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            background: rgba(21, 21, 34, 0.95);
        }

        .search-icon {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-green);
            font-size: 1.3rem;
        }

        .news-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .news-item {
            background: rgba(21, 21, 34, 0.5);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 157, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            transition: var(--transition);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .news-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 50px rgba(0, 255, 157, 0.2);
            border-color: var(--neon-green);
        }

        .news-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 0.8rem;
            line-height: 1.3;
            transition: color 0.3s ease;
            cursor: pointer;
        }
        
        .news-title:hover {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.3);
        }

        .news-meta {
            display: flex;
            gap: 2rem;
            color: var(--neon-green);
            font-size: 0.95rem;
            margin-bottom: 1.2rem;
            opacity: 0.9;
        }

        .news-meta i {
            margin-right: 0.5rem;
        }

        .author-link {
            transition: all 0.3s ease;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        

        .news-excerpt {
            color: #b0b0d0;
            font-size: 1rem;
            line-height: 1.7;
        }

        .read-more {
            transition: all 0.3s ease;
            position: relative;
            display: inline-block;
            color: var(--neon-green) !important;
            font-weight: 600;
            margin-left: 5px;
            cursor: pointer;
        }
        
        .read-more:hover {
            transform: translateX(5px);
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.5);
        }
        
        .read-more::after {
            content: '→';
            margin-left: 5px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .read-more:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        .no-results {
            text-align: center;
            padding: 4rem 2rem;
            color: #b0b0d0;
            border: 1px dashed rgba(0, 255, 157, 0.2);
            border-radius: 20px;
        }

        .no-results i {
            font-size: 3rem;
            color: var(--neon-green);
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .error-message {
            text-align: center;
            padding: 4rem 2rem;
            color: #ff6b6b;
            border: 1px dashed rgba(255, 0, 60, 0.3);
            border-radius: 20px;
            background: rgba(255, 0, 60, 0.05);
        }

        .error-message i {
            font-size: 3rem;
            color: var(--neon-red);
            margin-bottom: 1rem;
        }

        .retry-btn {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: transparent;
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .retry-btn:hover {
            background: var(--neon-red);
            color: var(--dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 0, 60, 0.3);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 3rem;
            flex-wrap: wrap;
        }

        .page-item {
            list-style: none;
        }

        .page-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: rgba(21, 21, 34, 0.7);
            border: 1px solid rgba(0, 255, 157, 0.2);
            border-radius: 10px;
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            cursor: pointer;
        }

        .page-link:hover {
            background: rgba(0, 255, 157, 0.1);
            border-color: var(--neon-green);
            transform: translateY(-3px);
        }

        .page-link.active {
            background: linear-gradient(135deg, var(--neon-green), var(--green));
            color: var(--dark);
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.4);
        }

        .page-link.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .page-link.prev,
        .page-link.next {
            width: auto;
            padding: 0 1.5rem;
            gap: 8px;
        }

        .pagination-info {
            color: #b0b0d0;
            font-size: 0.9rem;
            margin-top: 1rem;
            text-align: center;
            width: 100%;
        }

        .footer {
            background: rgba(10, 10, 20, 0.95);
            border-top: 1px solid rgba(0, 255, 157, 0.1);
            padding: 4rem 2rem 2rem;
            margin-top: 4rem;
            position: relative;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            box-shadow: 0 0 15px var(--neon-green);
        }

        .footer-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .footer-content {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 4rem;
            margin-bottom: 4rem;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 2rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .footer-description {
            color: #b0b0d0;
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .social-links {
            display: flex;
            gap: 1.2rem;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(0, 255, 157, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-green);
            text-decoration: none;
            transition: var(--transition);
            border: 1px solid rgba(0, 255, 157, 0.2);
        }

        .social-link:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 255, 157, 0.3);
            border-color: var(--neon-green);
            background: var(--neon-green);
            color: var(--dark);
        }

        .footer-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.8rem;
            color: var(--white);
            position: relative;
            padding-bottom: 10px;
        }

        .footer-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            border-radius: 2px;
        }

        .footer-links {
            list-style: none;
        }

        .footer-links li {
            margin-bottom: 1.2rem;
        }

        .footer-links a {
            color: #b0b0d0;
            text-decoration: none;
            transition: var(--transition);
        }

        .footer-links a:hover {
            color: var(--neon-green);
            transform: translateX(10px);
        }

        .footer-bottom {
            padding-top: 3rem;
            border-top: 1px solid rgba(0, 255, 157, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #b0b0d0;
            font-size: 0.9rem;
        }

        .footer-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--neon-green);
            font-weight: 600;
            text-shadow: 0 0 10px var(--neon-green);
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .footer-badge i {
            animation: heartbeat 1.5s infinite;
        }

        .mobile-menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 35px;
            height: 25px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1001;
        }

        .mobile-menu-toggle span {
            display: block;
            height: 3px;
            width: 100%;
            background-color: var(--neon-green);
            border-radius: 3px;
            transition: var(--transition);
            box-shadow: 0 0 5px var(--neon-green);
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(10, 10, 20, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
            padding: 2rem;
            backdrop-filter: blur(20px);
        }

        .mobile-menu.active {
            transform: translateX(0);
        }

        .mobile-nav-links {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            margin-bottom: 4rem;
            text-align: center;
            width: 100%;
            max-width: 300px;
        }

        .mobile-nav-link {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.8rem;
            padding: 0.8rem 0;
            transition: var(--transition);
            text-shadow: 0 0 10px var(--neon-green);
            border-bottom: 1px solid rgba(0, 255, 157, 0.1);
        }

        .mobile-nav-link:hover {
            color: var(--neon-green);
            transform: translateX(10px);
            border-bottom-color: var(--neon-green);
        }

        .mobile-nav-actions {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 250px;
        }

        .mobile-nav-actions .btn {
            width: 100%;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        @media (max-width: 1024px) {
            .footer-content {
                grid-template-columns: 1fr 1fr;
                gap: 3rem;
            }
        }

        @media (max-width: 768px) {
            .nav-links, .nav-actions {
                display: none;
            }
            
            .mobile-menu-toggle {
                display: flex;
            }
            
            .news-hero {
                padding: 10rem 1.5rem 3rem;
            }
            
            .news-hero-title {
                font-size: 2.2rem;
            }
            
            .news-stats {
                flex-direction: column;
                align-items: center;
                gap: 1.5rem;
            }
            
            .news-content {
                padding: 2rem 1.5rem;
            }
            
            .news-title {
                font-size: 1.4rem;
            }
            
            .news-meta {
                flex-wrap: wrap;
                gap: 1rem;
            }
            
            .footer-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .footer-title::after {
                left: 50%;
                transform: translateX(-50%);
            }
            
            .footer-bottom {
                flex-direction: column;
                gap: 1.5rem;
                text-align: center;
            }
            
            .page-link {
                width: 40px;
                height: 40px;
            }
            
            .page-link.prev,
            .page-link.next {
                padding: 0 1rem;
            }
        }

        @media (max-width: 480px) {
            .news-hero-title {
                font-size: 1.8rem;
            }
            
            .news-item {
                padding: 1.5rem;
            }
            
            .page-link {
                width: 35px;
                height: 35px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-container">
            <div class="loader-circle"></div>
            <div class="loader-letter" id="loaderLetter">Н</div>
        </div>
        <div class="loader-text">Зареждане на новините</div>
    </div>
    
    <div class="animated-bg"></div>
    

    <kirilix-header></kirilix-header>

    <section class="news-hero">
        <div class="news-hero-content">
            <div class="news-hero-badge fade-in">
                <i class="fas fa-newspaper"></i>
                Актуални новини
            </div>
            <h1 class="news-hero-title fade-in delay-1">
                Новини от <span>KiriliX</span>
            </h1>
            <p class="news-hero-description fade-in delay-2">
                Всички новини на едно място - обновления, събития и съобщения
            </p>
            
            <div class="news-stats fade-in delay-3">
                <div class="stat-card">
                    <div class="stat-number" id="totalNewsCount">0</div>
                    <div class="stat-label">Новини</div>
                </div>
            </div>
        </div>
    </section>

    <div class="news-content">
        <div class="search-container fade-in">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="newsSearch" placeholder="Търсене по заглавие, съдържание или автор...">
        </div>
        
        <div class="news-list" id="newsList">
            <div class="no-results">
                <i class="fas fa-spinner fa-spin"></i>
                <h3>Зареждане на новините...</h3>
            </div>
        </div>
        
        <nav class="pagination" id="pagination"></nav>
        <div class="pagination-info" id="paginationInfo"></div>
    </div>

    <kirilix-footer></kirilix-footer>

    <script src="../JS/header.js" type="module"></script>
    <script src="../JS/footer.js" type="module"></script>
    <script src="../JS/config.js"></script>
    <script>
        // Конфигурация
        const newsPerPage = 5;
        
        // Състояние
        let allNews = [];
        let filteredNews = [];
        let currentPage = 1;
        let searchTerm = '';
        let isLoading = false;
        let error = null;

        // Елементи
        const newsListEl = document.getElementById('newsList');
        const paginationEl = document.getElementById('pagination');
        const paginationInfoEl = document.getElementById('paginationInfo');
        const searchInput = document.getElementById('newsSearch');
        const totalNewsCountEl = document.getElementById('totalNewsCount');
        const loader = document.getElementById('loader');

        // Функция за нормализиране на новините
        function normalizeNews(data) {
            let newsArray = [];
            
            if (Array.isArray(data)) {
                newsArray = data;
            } else if (data.data && Array.isArray(data.data)) {
                newsArray = data.data;
            } else if (data.news && Array.isArray(data.news)) {
                newsArray = data.news;
            } else {
                throw new Error('Неочакван формат на данните');
            }
            
            return newsArray.map(item => ({
                id: item.id,
                title: item.title || 'Без заглавие',
                excerpt: item.excerpt || item.content || item.description || 'Няма съдържание',
                fullContent: item.content || item.full_content || item.excerpt || 'Няма съдържание',
                date: formatDate(item.created_at || item.date || item.published_at || new Date().toISOString()),
                author: item.author || item.author_name || 'Екип на KiriliX',
                authorId: item.author_id || item.user_id || 1,
                slug: item.slug || item.id
            }));
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return 'Невалидна дата';
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('bg-BG', options);
        }

        function updateStats() {
            totalNewsCountEl.textContent = allNews.length;
        }

        // Основна функция за зареждане на новини
        async function loadNews() {
            isLoading = true;
            error = null;
            
            try {
                // Първо провери в sessionStorage
                const savedNews = sessionStorage.getItem('kirilixNews');
                
                if (savedNews) {
                    console.log('Зареждане от sessionStorage');
                    allNews = JSON.parse(savedNews);
                    filteredNews = [...allNews];
                    updateStats();
                    renderNews();
                    renderPagination();
                    isLoading = false;
                    return;
                }
                
                const response = await fetch(API_CONFIG.NEWS, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`Грешка ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                allNews = normalizeNews(data);
                filteredNews = [...allNews];
                
                // Запази в sessionStorage
                sessionStorage.setItem('kirilixNews', JSON.stringify(allNews));
                console.log(`Запазени ${allNews.length} новини в sessionStorage`);
                
                updateStats();
                
            } catch (err) {
                console.error('Грешка:', err);
                error = err.message;
                allNews = [];
                filteredNews = [];
            } finally {
                isLoading = false;
                renderNews();
                renderPagination();
            }
        }

        function filterNews() {
            const term = searchTerm.toLowerCase().trim();
            
            if (term === '') {
                filteredNews = [...allNews];
            } else {
                filteredNews = allNews.filter(news => 
                    news.title.toLowerCase().includes(term) ||
                    news.excerpt.toLowerCase().includes(term) ||
                    news.author.toLowerCase().includes(term)
                );
            }
            
            currentPage = 1;
            renderNews();
            renderPagination();
        }

        function goToNewsDetail(newsId, slug) {
            window.location.href = `news_details.html?id=${newsId}`;
        }

        function goToAuthorProfile(authorId) {
            window.location.href = `profile.html?id=${authorId}`;
        }

        function renderNews() {
            if (isLoading) {
                newsListEl.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-spinner fa-spin"></i>
                        <h3>Зареждане на новините...</h3>
                    </div>
                `;
                return;
            }

            if (error) {
                newsListEl.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Грешка при зареждане</h3>
                        <p>${error}</p>
                        <button class="retry-btn" onclick="loadNews()">
                            <i class="fas fa-redo"></i> Опитай отново
                        </button>
                    </div>
                `;
                return;
            }

            const start = (currentPage - 1) * newsPerPage;
            const end = start + newsPerPage;
            const newsToShow = filteredNews.slice(start, end);

            if (newsToShow.length === 0) {
                newsListEl.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>Няма намерени новини</h3>
                        <p>Пробвайте с друго търсене</p>
                    </div>
                `;
                paginationEl.innerHTML = '';
                paginationInfoEl.innerHTML = '';
                return;
            }

            let html = '';
            newsToShow.forEach((news, index) => {
                const maxExcerptLength = 200;
                const excerpt = news.excerpt.length > maxExcerptLength 
                    ? news.excerpt.substring(0, maxExcerptLength) + '...' 
                    : news.excerpt;
                
                html += `
                    <div class="news-item fade-in" style="animation-delay: ${index * 0.1}s">
                        <h2 class="news-title" onclick="goToNewsDetail(${news.id}, '${news.slug}')">${escapeHtml(news.title)}</h2>
                        <div class="news-meta">
                            <span><i class="far fa-calendar-alt"></i> ${escapeHtml(news.date)}</span>
                            <span class="author-link" onclick="goToAuthorProfile(${news.authorId})">
                                <i class="far fa-user"></i> ${escapeHtml(news.author)}
                            </span>
                        </div>
                        <div class="news-excerpt">
                            ${escapeHtml(excerpt)}
                            ${news.excerpt.length > maxExcerptLength ? 
                                `<span class="read-more" onclick="goToNewsDetail(${news.id}, '${news.slug}')">Виж повече...</span>` 
                                : ''}
                        </div>
                    </div>
                `;
            });

            newsListEl.innerHTML = html;
            updatePaginationInfo();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderPagination() {
            if (isLoading || error || filteredNews.length === 0) {
                paginationEl.innerHTML = '';
                return;
            }

            const totalPages = Math.ceil(filteredNews.length / newsPerPage);
            
            if (totalPages <= 1) {
                paginationEl.innerHTML = '';
                return;
            }

            let html = '';

            html += `
                <div class="page-link prev ${currentPage === 1 ? 'disabled' : ''}" data-page="${currentPage - 1}">
                    <i class="fas fa-chevron-left"></i> Назад
                </div>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `
                        <div class="page-link ${currentPage === i ? 'active' : ''}" data-page="${i}">${i}</div>
                    `;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<div class="page-link disabled">...</div>`;
                }
            }

            html += `
                <div class="page-link next ${currentPage === totalPages ? 'disabled' : ''}" data-page="${currentPage + 1}">
                    Напред <i class="fas fa-chevron-right"></i>
                </div>
            `;

            paginationEl.innerHTML = html;

            document.querySelectorAll('.page-link[data-page]').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    if (!this.classList.contains('disabled')) {
                        currentPage = parseInt(this.dataset.page);
                        renderNews();
                        renderPagination();
                        window.scrollTo({ 
                            top: document.querySelector('.news-content').offsetTop - 100, 
                            behavior: 'smooth' 
                        });
                    }
                });
            });
        }

        function updatePaginationInfo() {
            const total = filteredNews.length;
            if (total === 0 || isLoading || error) {
                paginationInfoEl.textContent = '';
                return;
            }
            
            const start = (currentPage - 1) * newsPerPage + 1;
            const end = Math.min(currentPage * newsPerPage, total);
            paginationInfoEl.textContent = `Показване на ${start} - ${end} от ${total} новини`;
        }

        let searchTimeout;
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTerm = this.value;
            searchTimeout = setTimeout(filterNews, 300);
        });

        window.addEventListener('load', async function() {
            await new Promise(resolve => setTimeout(resolve, 800));
            await loadNews();
            loader.classList.add('hidden');
        });


        window.loadNews = loadNews;
        window.goToNewsDetail = goToNewsDetail;
        window.goToAuthorProfile = goToAuthorProfile;
    </script>
</body>
</html>
