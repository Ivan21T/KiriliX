<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiriliX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link href="../CSS/news_details.css"  rel="stylesheet">
</head>
<body>
    <div class="animated-bg">
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
    </div>
    
    <div class="bulgarian-pattern"></div>

    <kiriliX-header></kiriliX-header>

    <main class="news-detail-container">
        <div class="back-button-top">
            <a href="news.html" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i>
                Обратно към новините
            </a>
        </div>
        
        <div class="news-detail-header">
            <h1 class="news-detail-title" id="newsDetailTitle">Зареждане...</h1>
            
            <div class="news-meta-detail">
                <div class="news-author-detail">
                    <div class="author-avatar-large" id="newsAuthorAvatar">EK</div>
                    <div>
                        <div id="newsAuthorName">Екип на KiriliX</div>
                        <div id="newsPublishDate">...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="news-content-detail" id="newsContentContainer">
            <div class="loading-container" id="loadingIndicator">
                <div class="loading-spinner"></div>
                <p>Зареждане на новината...</p>
            </div>
            
            <div class="news-text-container" id="newsTextContainer" style="display: none;">
                <div class="news-text" id="newsContent"></div>
            </div>
            
            <div class="error-container" id="errorIndicator" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <h2 class="error-title">Грешка при зареждане</h2>
                <p class="error-message" id="errorMessage">Новината не можа да бъде заредена. Моля, опитайте по-късно.</p>
                <button class="btn btn-primary" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i>
                    Опитай отново
                </button>
            </div>
        </div>
        
        <div class="news-actions-simple">
            <div class="news-stats">
                <div class="news-stat">
                    <i class="far fa-calendar-alt"></i>
                    Публикувана на: <span id="newsFullDate">...</span>
                </div>
                <div class="news-stat">
                    <i class="fas fa-user-edit"></i>
                    Автор: <span id="newsAuthorFull">Екип на KiriliX</span>
                </div>
            </div>
        </div>
    </main>

    <kiriliX-footer></kiriliX-footer>

    <script src="../JS/config.js"></script>
    <script src="../JS/footer.js" type="module"></script>
    <script src="../JS/header.js" type="module"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const newsId = urlParams.get('id');

        const FIXED_AUTHOR = 'Екип на KiriliX';
        const FIXED_AUTHOR_INITIALS = 'EK';

        function formatDate(utcDateString) {
            const date = new Date(utcDateString);
            return date.toLocaleDateString('bg-BG', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function showError(message) {
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('newsTextContainer').style.display = 'none';
            document.getElementById('errorIndicator').style.display = 'flex';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('newsDetailTitle').textContent = 'Грешка';
        }

        function displayNews(news) {
            const formattedDate = formatDate(news.publishedAt);
            
            document.title = `${news.title} | KiriliX Новини`;
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('errorIndicator').style.display = 'none';
            document.getElementById('newsTextContainer').style.display = 'block';
            
            document.getElementById('newsDetailTitle').textContent = news.title;
            document.getElementById('newsAuthorAvatar').textContent = FIXED_AUTHOR_INITIALS;
            document.getElementById('newsAuthorName').textContent = FIXED_AUTHOR;
            document.getElementById('newsPublishDate').textContent = formattedDate;
            document.getElementById('newsContent').innerHTML = news.description || 'Няма съдържание.';
            document.getElementById('newsFullDate').textContent = formattedDate;
            document.getElementById('newsAuthorFull').textContent = FIXED_AUTHOR;
        }

        async function fetchNewsById(id) {
            if (!id || isNaN(parseInt(id))) {
                showError('Невалиден идентификатор на новина.');
                return;
            }

            try {
                document.getElementById('loadingIndicator').style.display = 'flex';
                document.getElementById('errorIndicator').style.display = 'none';
                document.getElementById('newsTextContainer').style.display = 'none';
                
                const url = `${window.API_CONFIG.NEWS}/${id}`;
                const response = await authFetch(url, {
                    method: 'GET'
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error('Новината не е намерена.');
                    } else if (response.status === 500) {
                        throw new Error('Вътрешна грешка в сървъра. Моля, опитайте по-късно.');
                    } else {
                        throw new Error(`Грешка при зареждане: ${response.status}`);
                    }
                }

                const news = await response.json();
                displayNews(news);
                
            } catch (error) {
                console.error('Грешка при fetch:', error);
                showError(error.message || 'Възникна грешка при зареждането на новината.');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetchNewsById(newsId);
        });
    </script>
</body>
</html>
