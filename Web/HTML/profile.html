<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Моят Профил | KiriliX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --white: #ffffff;
            --neon-green: #00ff9d;
            --neon-red: #ff003c;
            --green: #00cc7a;
            --red: #e60033;
            --dark: #0a0a14;
            --dark-secondary: #151522;
            --purple: #8a2be2;
            --cyan: #00f3ff;
            --shadow: 0 0 20px rgba(0, 255, 157, 0.3);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 157, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(138, 43, 226, 0.03) 0%, transparent 50%),
                linear-gradient(45deg, var(--dark) 0%, #0d0f1a 100%);
        }

        .bg-element {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 15s infinite linear;
            filter: blur(40px);
        }

        .bg-element:nth-child(1) {
            width: 400px;
            height: 400px;
            background: var(--neon-green);
            top: 10%;
            left: 5%;
            animation-delay: 0s;
            animation-duration: 25s;
        }

        .bg-element:nth-child(2) {
            width: 300px;
            height: 300px;
            background: var(--neon-red);
            top: 60%;
            left: 80%;
            animation-delay: 5s;
            animation-duration: 30s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(50px, -80px) rotate(120deg); }
            66% { transform: translate(-30px, 40px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .bulgarian-pattern {
            background-image: 
                linear-gradient(45deg, var(--neon-green) 25%, transparent 25%), 
                linear-gradient(-45deg, var(--neon-green) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--neon-red) 75%), 
                linear-gradient(-45deg, transparent 75%, var(--neon-red) 75%);
            background-size: 30px 30px;
            background-position: 0 0, 0 15px, 15px -15px, -15px 0px;
            opacity: 0.03;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bulgarian-border {
            height: 4px;
            background: linear-gradient(90deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            box-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-red);
        }

        .profile-nav {
            max-width: 1200px;
            margin: 100px auto 20px;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: rgba(21, 21, 34, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-green);
            border-radius: 50px;
            color: var(--neon-green);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
            position: relative;
            overflow: hidden;
        }

        .back-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 157, 0.2), transparent);
            transition: var(--transition);
        }

        .back-btn:hover::before {
            left: 100%;
        }

        .back-btn:hover {
            background: var(--neon-green);
            color: var(--dark);
            transform: translateX(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.4);
        }

        .back-btn i {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }

        .back-btn:hover i {
            transform: translateX(-3px);
        }

        @media (max-width: 768px) {
            .profile-nav { margin: 80px auto 15px; }
            .back-btn { padding: 12px 24px; font-size: 1rem; gap: 10px; }
            .back-btn i { font-size: 1.1rem; }
        }

        @media (max-width: 480px) {
            .profile-nav { margin: 70px auto 10px; padding: 0 15px; }
            .back-btn { padding: 10px 20px; font-size: 0.95rem; gap: 8px; width: 100%; justify-content: center; }
        }

        @media (max-width: 360px) {
            .profile-nav { margin: 60px auto 10px; }
            .back-btn { padding: 8px 16px; font-size: 0.9rem; }
        }

        .profile-container {
            max-width: 1200px;
            margin: 20px auto 60px;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            background: rgba(21, 21, 34, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid rgba(0, 255, 157, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-green), var(--neon-red), transparent);
            transition: var(--transition);
            opacity: 0;
            animation: flagMove 3s infinite linear;
        }

        @keyframes flagMove {
            0% { left: -100%; opacity: 0.5; }
            100% { left: 100%; opacity: 0.5; }
        }

        .profile-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark);
            font-weight: 700;
            font-size: 64px;
            box-shadow: 0 0 30px var(--neon-green), 0 0 60px rgba(255, 0, 60, 0.3);
            position: relative;
            transition: var(--transition);
            border: 4px solid rgba(255, 255, 255, 0.1);
        }

        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--neon-green), 0 0 80px var(--neon-red);
        }

        .profile-info { flex: 1; }
        .profile-name {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--white), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .profile-email {
            font-size: 1.2rem;
            color: #b0b0d0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .profile-email i { color: var(--neon-green); font-size: 1.2rem; }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(21, 21, 34, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(0, 255, 157, 0.1);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-green), var(--neon-red), transparent);
            transition: var(--transition);
            opacity: 0;
        }

        .stat-card:hover::before {
            opacity: 1;
            left: 100%;
            animation: flagMove 1.5s infinite linear;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.2);
            border-color: rgba(0, 255, 157, 0.3);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--neon-green);
            margin-bottom: 5px;
            text-shadow: 0 0 20px var(--neon-green);
        }
        .stat-label {
            color: #b0b0d0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 1.8rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            border: none;
            outline: none;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: var(--transition);
        }

        .btn:hover::before { left: 100%; }

        .btn-outline {
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            background: transparent;
            text-shadow: 0 0 5px var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
        }
        .btn-outline:hover {
            color: var(--dark);
            background: var(--neon-green);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 255, 157, 0.5);
        }

        .btn-danger {
            border: 2px solid var(--neon-red);
            color: var(--neon-red);
            background: transparent;
            text-shadow: 0 0 5px var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
        }
        .btn-danger:hover {
            color: var(--dark);
            background: var(--neon-red);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 0, 60, 0.5);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-green), var(--green));
            color: var(--dark);
            border: none;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 255, 157, 0.6);
            background: linear-gradient(135deg, var(--neon-green), #00ff9d);
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--white);
            position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--white) 33%, var(--neon-green) 33%, var(--neon-green) 66%, var(--neon-red) 66%);
            box-shadow: 0 0 15px var(--neon-green);
            border-radius: 2px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .post-card {
            background: rgba(21, 21, 34, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(0, 255, 157, 0.1);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-green), var(--neon-red), transparent);
            transition: var(--transition);
            opacity: 0;
        }

        .post-card:hover::before {
            opacity: 1;
            left: 100%;
            animation: flagMove 1.5s infinite linear;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 157, 0.2);
            border-color: rgba(0, 255, 157, 0.3);
        }

        .post-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 15px;
        }
        .post-date {
            color: #b0b0d0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .post-date i { color: var(--neon-green); font-size: 0.8rem; }

        .post-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--white);
            line-height: 1.4;
        }
        .post-excerpt {
            color: #b0b0d0;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 157, 0.1);
        }
        .post-stats { display: flex; gap: 15px; }
        .post-stat {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #b0b0d0;
            font-size: 0.85rem;
        }
        .post-stat i { color: var(--neon-green); }
        .post-actions { display: flex; gap: 10px; }

        .post-action-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            text-decoration: none;
            transition: var(--transition);
            border: 1px solid rgba(0, 255, 157, 0.1);
            cursor: pointer;
        }
        .post-action-btn:hover {
            background: var(--neon-green);
            color: var(--dark);
            transform: scale(1.1);
            border-color: var(--neon-green);
        }
        .post-action-btn.delete:hover {
            background: var(--neon-red);
            color: var(--white);
            border-color: var(--neon-red);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(21, 21, 34, 0.5);
            border-radius: 20px;
            border: 2px dashed rgba(0, 255, 157, 0.2);
        }
        .empty-state i { font-size: 3rem; color: var(--white); opacity: 0.5; }
        .empty-state h3 { font-size: 1.8rem; margin-bottom: 15px; color: var(--white); }
        .empty-state p { color: #b0b0d0; margin-bottom: 30px; }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 50px;
            flex-wrap: wrap;
        }
        .pagination-btn {
            min-width: 45px;
            height: 45px;
            border-radius: 12px;
            background: rgba(21, 21, 34, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(0, 255, 157, 0.2);
            color: var(--white);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            padding: 0 15px;
            font-family: 'Inter', sans-serif;
        }
        .pagination-btn:hover:not(:disabled) {
            border-color: var(--neon-green);
            background: rgba(0, 255, 157, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 157, 0.2);
        }
        .pagination-btn.active {
            background: var(--neon-green);
            color: var(--dark);
            border-color: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
        }
        .pagination-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .pagination-dots { color: var(--neon-green); font-weight: 600; padding: 0 5px; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--dark-secondary);
            border-radius: 20px;
            padding: 40px;
            max-width: 550px;
            width: 90%;
            border: 1px solid rgba(0, 255, 157, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(0, 255, 157, 0.3);
            position: relative;
        }
        .modal-icon { font-size: 3rem; color: var(--neon-green); text-align: center; margin-bottom: 20px; }
        .modal-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 25px; color: var(--white); text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--neon-green); font-weight: 500; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(10, 10, 20, 0.8);
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: var(--transition);
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.3);
        }
        .form-group textarea { resize: vertical; min-height: 150px; }
        .modal-actions { display: flex; gap: 15px; justify-content: center; margin-top: 25px; }

        .modal.delete-modal .modal-icon { color: var(--neon-red); text-shadow: 0 0 30px var(--neon-red); }
        .modal.delete-modal .modal-content { border-color: rgba(255, 0, 60, 0.3); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(255, 0, 60, 0.3); }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: var(--neon-green);
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark-secondary);
            border-left: 4px solid var(--neon-green);
            border-radius: 10px;
            padding: 15px 25px;
            color: var(--white);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--neon-green);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }
        .toast.show { transform: translateX(0); }
        .toast.error { border-left-color: var(--neon-red); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px var(--neon-red); }

        @media (max-width: 768px) {
            .profile-container { margin: 15px auto 40px; }
            .profile-header { flex-direction: column; text-align: center; padding: 30px 20px; }
            .profile-avatar { width: 120px; height: 120px; font-size: 48px; }
            .profile-name { font-size: 2.2rem; }
            .profile-stats { grid-template-columns: repeat(3, 1fr); gap: 15px; }
            .stat-card { padding: 20px; }
            .stat-number { font-size: 2rem; }
            .profile-actions { justify-content: center; }
            .posts-grid { grid-template-columns: 1fr; }
            .section-title { font-size: 1.8rem; }
            .pagination-btn { min-width: 40px; height: 40px; font-size: 0.9rem; }
            .modal-content { padding: 30px 25px; }
        }
        @media (max-width: 480px) {
            .profile-container { padding: 0 15px; }
            .profile-header { padding: 25px 15px; }
            .profile-avatar { width: 100px; height: 100px; font-size: 40px; }
            .profile-name { font-size: 1.8rem; }
            .profile-email { font-size: 1rem; flex-wrap: wrap; justify-content: center; }
            .profile-stats { grid-template-columns: 1fr; }
            .profile-actions { flex-direction: column; width: 100%; }
            .profile-actions .btn { width: 100%; justify-content: center; }
            .posts-grid { grid-template-columns: 1fr; }
            .post-card { padding: 20px; }
            .post-title { font-size: 1.2rem; }
            .post-footer { flex-direction: column; gap: 15px; align-items: flex-start; }
            .post-actions { width: 100%; justify-content: flex-end; }
            .empty-state { padding: 50px 15px; }
            .empty-state i { font-size: 4rem; }
            .empty-state h3 { font-size: 1.4rem; }
            .pagination { gap: 5px; }
            .pagination-btn { min-width: 35px; height: 35px; font-size: 0.85rem; padding: 0 8px; }
            .modal-content { padding: 25px 20px; }
            .modal-title { font-size: 1.5rem; }
            .modal-actions { flex-direction: column; }
            .toast { left: 20px; right: 20px; bottom: 20px; transform: translateY(100px); }
            .toast.show { transform: translateY(0); }
        }
        @media (max-width: 360px) {
            .profile-name { font-size: 1.5rem; }
            .profile-email { font-size: 0.9rem; }
            .stat-number { font-size: 1.8rem; }
            .stat-label { font-size: 0.8rem; }
            .post-date { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="alert-container" id="alert-container"></div>
    
    <div class="animated-bg">
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
        <div class="bg-element"></div>
    </div>
    <div class="bulgarian-pattern"></div>

    <nav class="profile-nav">
        <a href="javascript:history.back()" class="back-btn" id="backBtn">
            <i class="fas fa-arrow-left"></i>
            <span>Назад</span>
        </a>
    </nav>

    <main class="profile-container">
        <div class="profile-header fade-in">
            <div class="profile-avatar" id="profileAvatar">U</div>
            <div class="profile-info">
                <h1 class="profile-name" id="profileName">Зареждане...</h1>
                <div class="profile-email">
                    <i class="fas fa-envelope"></i>
                    <span id="profileEmail">зареждане...</span>
                </div>
                <div class="profile-actions">
                    <button class="btn btn-outline" id="editProfileBtn">
                        <i class="fas fa-edit"></i>
                        Редактирай профил
                    </button>
                    <button class="btn btn-outline" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        Изход
                    </button>
                    <button class="btn btn-danger" id="deleteAccountBtn">
                        <i class="fas fa-trash-alt"></i>
                        Изтрий профила
                    </button>
                </div>
            </div>
        </div>

        <div class="profile-stats fade-in delay-1">
            <div class="stat-card">
                <div class="stat-number" id="postsCount">0</div>
                <div class="stat-label">Публикации</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="commentsCount">0</div>
                <div class="stat-label">Коментара</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="memberSince">2024</div>
                <div class="stat-label">Член от</div>
            </div>
        </div>

        <div class="fade-in delay-2">
            <h2 class="section-title">
                <i class="fas fa-newspaper" style="margin-right: 10px; color: var(--neon-green);"></i>
                Моите публикации
            </h2>
            <div class="posts-grid" id="postsContainer"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <!-- Модал за редактиране -->
    <div class="modal" id="editPostModal">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-edit"></i></div>
            <h2 class="modal-title">Редактирай публикация</h2>
            <div class="form-group">
                <label>Заглавие</label>
                <input type="text" id="editPostTitle" placeholder="Въведете заглавие">
            </div>
            <div class="form-group">
                <label>Съдържание</label>
                <textarea id="editPostContent" placeholder="Въведете съдържание"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelEditBtn">Отказ</button>
                <button class="btn btn-primary" id="saveEditBtn">
                    <span id="saveEditText">Запази</span>
                    <span class="loader" id="saveEditLoader" style="display: none;"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Модал за изтриване на профил -->
    <div class="modal delete-modal" id="deleteModal">
        <div class="modal-content">
            <div class="modal-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <h2 class="modal-title">Изтриване на профил</h2>
            <p class="modal-text">
                Сигурни ли сте, че искате да изтриете профила си?<br>
                <strong style="color: var(--neon-red);">Това действие е необратимо!</strong>
            </p>
            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelDeleteBtn">Отказ</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">
                    <span id="deleteBtnText">Изтрий профила</span>
                    <span class="loader" id="deleteLoader" style="display: none;"></span>
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"><span id="toastMessage"></span></div>

<script src="../JS/config.js"></script>
<script src="../JS/notification_system.js"></script>
<script>
    let currentUser = null;
    let userPosts = [];
    let currentPage = 1;
    let postsPerPage = 6;
    let totalPages = 1;
    let currentEditPostId = null;

    function checkAuthAndRedirect() {
        const token = localStorage.getItem('authToken');
        if (!token) {
            showAlert('Моля, влезте в профила си', 'error');
            setTimeout(() => window.location.href = '../HTML/login.html', 1000);
            return false;
        }
        return true;
    }

    async function loadCurrentUser() {
        try {
            const response = await authFetch(`${window.API_CONFIG.USER}/current-user`);
            if (response.status === 401) {
                localStorage.removeItem('authToken');
                showAlert('Сесията ви е изтекла. Моля, влезте отново.', 'error');
                setTimeout(() => window.location.href = '../HTML/login.html', 1500);
                return false;
            }
            if (!response.ok) throw new Error('Грешка при зареждане на потребител');
            
            const user = await response.json();
            currentUser = user;
            
            document.getElementById('profileName').textContent = currentUser.username || 'Потребител';
            document.getElementById('profileEmail').textContent = currentUser.email || 'user@example.com';
            const firstLetter = currentUser.username ? currentUser.username.charAt(0).toUpperCase() : 'U';
            document.getElementById('profileAvatar').textContent = firstLetter;
            
            if (currentUser.createdAt) {
                const joinYear = new Date(currentUser.createdAt).getFullYear();
                document.getElementById('memberSince').textContent = joinYear;
            }
            return true;
        } catch (error) {
            console.error('Грешка:', error);
            showAlert('Грешка при зареждане на профила', 'error');
            return false;
        }
    }

    // Зареждане на постовете на потребителя от sessionStorage (forum_posts)
    function loadUserPostsFromStorage(page = 1) {
        const postsContainer = document.getElementById('postsContainer');
        const paginationContainer = document.getElementById('pagination');
        currentPage = page;
        
        try {
            // Взимаме всички постове от sessionStorage
            const allPostsJson = sessionStorage.getItem('forum_posts');
            let allPosts = [];
            
            if (allPostsJson) {
                allPosts = JSON.parse(allPostsJson);
                console.log('Заредени постове от sessionStorage:', allPosts.length);
            } else {
                console.log('Няма постове в sessionStorage');
                allPosts = [];
            }
            
            // Филтрираме само тези, където author.id съвпада с currentUser.id
            userPosts = allPosts.filter(post => {
                return post.author && post.author.id === currentUser.id;
            });
            
            console.log(`Намерени ${userPosts.length} публикации за потребител ${currentUser.username}`);
            
            // Обновяваме статистиките
            document.getElementById('postsCount').textContent = userPosts.length;
            
            // Общ брой коментари
            const totalComments = userPosts.reduce((total, post) => {
                return total + (post.comments ? post.comments.length : 0);
            }, 0);
            document.getElementById('commentsCount').textContent = totalComments;
            
            // Пагинация
            totalPages = Math.ceil(userPosts.length / postsPerPage);
            
            if (userPosts.length === 0) {
                postsContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-newspaper"></i>
                        <h3>Нямате публикации</h3>
                        <p>Започнете да споделяте вашето знание с общността!</p>
                        <button class="btn btn-primary" onclick="window.location.href='new-post.html'">
                            <i class="fas fa-plus"></i>
                            Създай публикация
                        </button>
                    </div>
                `;
                paginationContainer.style.display = 'none';
                return;
            }
            
            // Показваме за текущата страница
            const startIndex = (page - 1) * postsPerPage;
            const endIndex = Math.min(startIndex + postsPerPage, userPosts.length);
            const postsForPage = userPosts.slice(startIndex, endIndex);
            
            postsContainer.innerHTML = postsForPage.map(post => `
                <div class="post-card">
                    <div class="post-header">
                        <span class="post-date">
                            <i class="far fa-calendar-alt"></i>
                            ${post.createdAt ? new Date(post.createdAt).toLocaleDateString('bg-BG') : 'скоро'}
                        </span>
                    </div>
                    <h3 class="post-title">${escapeHtml(post.title) || 'Без заглавие'}</h3>
                    <p class="post-excerpt">${escapeHtml(post.content || post.excerpt || '')}</p>
                    <div class="post-footer">
                        <div class="post-stats">
                            <span class="post-stat">
                                <i class="far fa-comment"></i> ${post.comments ? post.comments.length : 0}
                            </span>
                        </div>
                        <div class="post-actions">
                            <button class="post-action-btn" onclick="openEditModal(${post.id})" title="Редактирай">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="post-action-btn delete" onclick="deletePost(${post.id})" title="Изтрий">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            if (totalPages > 1) {
                generatePagination();
                paginationContainer.style.display = 'flex';
            } else {
                paginationContainer.style.display = 'none';
            }
            
        } catch (error) {
            console.error('Грешка при зареждане на публикации:', error);
            postsContainer.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Грешка при зареждане</h3>
                    <p>Неуспешно зареждане на вашите публикации.</p>
                    <button class="btn btn-primary" onclick="refreshPosts()">
                        <i class="fas fa-sync-alt"></i>
                        Опитай отново
                    </button>
                </div>
            `;
            paginationContainer.style.display = 'none';
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function refreshPosts() {
        loadUserPostsFromStorage(1);
    }
    
    function generatePagination() {
        const paginationContainer = document.getElementById('pagination');
        let paginationHTML = '';
        
        paginationHTML += `<button class="pagination-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
        
        const maxVisiblePages = 5;
        let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
        let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
        
        if (endPage - startPage + 1 < maxVisiblePages) {
            startPage = Math.max(1, endPage - maxVisiblePages + 1);
        }
        
        if (startPage > 1) {
            paginationHTML += `<button class="pagination-btn" onclick="changePage(1)">1</button>`;
            if (startPage > 2) paginationHTML += `<span class="pagination-dots">...</span>`;
        }
        
        for (let i = startPage; i <= endPage; i++) {
            paginationHTML += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }
        
        if (endPage < totalPages) {
            if (endPage < totalPages - 1) paginationHTML += `<span class="pagination-dots">...</span>`;
            paginationHTML += `<button class="pagination-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
        }
        
        paginationHTML += `<button class="pagination-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
        
        paginationContainer.innerHTML = paginationHTML;
    }
    
    window.changePage = function(page) {
        if (page < 1 || page > totalPages) return;
        loadUserPostsFromStorage(page);
        document.querySelector('.section-title')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    
    window.openEditModal = function(postId) {
        const post = userPosts.find(p => p.id === postId);
        if (post) {
            currentEditPostId = postId;
            document.getElementById('editPostTitle').value = post.title || '';
            document.getElementById('editPostContent').value = post.content || '';
            document.getElementById('editPostModal').classList.add('show');
        }
    };
    
    async function saveEditPost() {
        const title = document.getElementById('editPostTitle').value.trim();
        const content = document.getElementById('editPostContent').value.trim();
        
        if (!title) { showAlert('Моля, въведете заглавие', 'error'); return; }
        if (!content) { showAlert('Моля, въведете съдържание', 'error'); return; }
        
        const saveBtnText = document.getElementById('saveEditText');
        const saveBtnLoader = document.getElementById('saveEditLoader');
        const saveBtn = document.getElementById('saveEditBtn');
        
        saveBtnText.style.display = 'none';
        saveBtnLoader.style.display = 'inline-block';
        saveBtn.disabled = true;
        
        try {
            const response = await authFetch(`${window.API_CONFIG.POST}/${currentEditPostId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content })
            });
            
            if (response.status === 401) {
                localStorage.removeItem('authToken');
                showAlert('Сесията ви е изтекла. Моля, влезте отново.', 'error');
                setTimeout(() => window.location.href = '../HTML/login.html', 1500);
                return;
            }
            
            if (!response.ok) throw new Error('Грешка при редактиране');
            
            showAlert('Публикацията е обновена успешно!', 'success');
            
            // Обновяваме sessionStorage - взимаме актуалните данни
            const postsResponse = await authFetch(`${window.API_CONFIG.POST}/all`);
            if (postsResponse.ok) {
                const updatedPosts = await postsResponse.json();
                sessionStorage.setItem('forum_posts', JSON.stringify(updatedPosts));
            }
            
            document.getElementById('editPostModal').classList.remove('show');
            loadUserPostsFromStorage(currentPage);
            
        } catch (error) {
            console.error('Грешка при редактиране:', error);
            showAlert('Грешка при редактиране на публикацията', 'error');
        } finally {
            saveBtnText.style.display = 'inline';
            saveBtnLoader.style.display = 'none';
            saveBtn.disabled = false;
        }
    }
    
    window.deletePost = async function(postId) {
        if (confirm('Сигурни ли сте, че искате да изтриете тази публикация?')) {
            try {
                const response = await authFetch(`${window.API_CONFIG.POST}/${postId}`, { method: 'DELETE' });
                
                if (response.status === 401) {
                    localStorage.removeItem('authToken');
                    showAlert('Сесията ви е изтекла. Моля, влезте отново.', 'error');
                    setTimeout(() => window.location.href = '../HTML/login.html', 1500);
                    return;
                }
                
                if (!response.ok) throw new Error('Грешка при изтриване');
                
                showAlert('Публикацията е изтрита успешно!', 'success');
                
                // Обновяваме sessionStorage
                const postsResponse = await authFetch(`${window.API_CONFIG.POST}/all`);
                if (postsResponse.ok) {
                    const updatedPosts = await postsResponse.json();
                    sessionStorage.setItem('forum_posts', JSON.stringify(updatedPosts));
                }
                
                loadUserPostsFromStorage(1);
                
            } catch (error) {
                console.error('Грешка при изтриване:', error);
                showAlert('Грешка при изтриване на публикацията', 'error');
            }
        }
    };
    
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('authToken');
        showAlert('Успешен изход!', 'success');
        setTimeout(() => window.location.href = '../HTML/index.html', 1500);
    });
    
    document.getElementById('editProfileBtn')?.addEventListener('click', () => {
        window.location.href = 'edit_profile.html';
    });
    
    document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
        document.getElementById('editPostModal').classList.remove('show');
        currentEditPostId = null;
    });
    
    document.getElementById('saveEditBtn')?.addEventListener('click', saveEditPost);
    
    const deleteModal = document.getElementById('deleteModal');
    const deleteAccountBtn = document.getElementById('deleteAccountBtn');
    const cancelDeleteBtn = document.getElementById('cancelDeleteBtn');
    const confirmDeleteBtn = document.getElementById('confirmDeleteBtn');
    const deleteBtnText = document.getElementById('deleteBtnText');
    const deleteLoader = document.getElementById('deleteLoader');
    
    if (deleteAccountBtn) {
        deleteAccountBtn.addEventListener('click', () => deleteModal?.classList.add('show'));
    }
    if (cancelDeleteBtn) {
        cancelDeleteBtn.addEventListener('click', () => deleteModal?.classList.remove('show'));
    }
    if (confirmDeleteBtn) {
        confirmDeleteBtn.addEventListener('click', async () => {
            deleteBtnText.style.display = 'none';
            deleteLoader.style.display = 'inline-block';
            confirmDeleteBtn.disabled = true;
            
            try {
                const response = await authFetch(`${window.API_CONFIG.USER}/current-user`, { method: 'DELETE' });
                if (response.status === 401) {
                    localStorage.removeItem('authToken');
                    showAlert('Сесията ви е изтекла. Моля, влезте отново.', 'error');
                    setTimeout(() => window.location.href = '../HTML/login.html', 1500);
                    return;
                }
                if (!response.ok) throw new Error('Грешка при изтриване');
                
                localStorage.removeItem('authToken');
                showAlert('Профилът е изтрит успешно!', 'success');
                setTimeout(() => window.location.href = '../HTML/index.html', 1500);
                
            } catch (error) {
                showAlert('Грешка при изтриване на профила', 'error');
                deleteBtnText.style.display = 'inline';
                deleteLoader.style.display = 'none';
                confirmDeleteBtn.disabled = false;
                deleteModal?.classList.remove('show');
            }
        });
    }
    
    window.addEventListener('click', (e) => {
        if (e.target === deleteModal) deleteModal?.classList.remove('show');
        if (e.target === document.getElementById('editPostModal')) {
            document.getElementById('editPostModal').classList.remove('show');
            currentEditPostId = null;
        }
    });
    
    document.getElementById('backBtn')?.addEventListener('click', function(e) {
        e.preventDefault();
        if (document.referrer) history.back();
        else window.location.href = '../HTML/index.html';
    });
    
    async function init() {
        if (!checkAuthAndRedirect()) return;
        const userLoaded = await loadCurrentUser();
        if (userLoaded && currentUser) {
            loadUserPostsFromStorage(1);
        }
    }
    
    init();
</script>
</body>
</html>
